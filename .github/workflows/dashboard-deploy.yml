name: Dashboard Deploy

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install and build
        working-directory: dashboard
        run: |
          npm ci
          npm run build

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Package tarball
        run: |
          tar czf dashboard-${{ steps.version.outputs.version }}.tar.gz -C dashboard/dist .
          sha256sum dashboard-${{ steps.version.outputs.version }}.tar.gz | awk '{print $1}' > sha256.txt

      - name: Upload to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          AWS_DEFAULT_REGION: auto
        run: |
          TARBALL="dashboard-${{ steps.version.outputs.version }}.tar.gz"
          SHA=$(cat sha256.txt)

          aws s3 cp "$TARBALL" "s3://cogitator-dashboard-assets/dashboard/$TARBALL" --no-sign-request=false

          cat > latest.json << JSONEOF
          {
            "version": "${{ steps.version.outputs.version }}",
            "file": "$TARBALL",
            "sha256": "$SHA"
          }
          JSONEOF

          aws s3 cp latest.json "s3://cogitator-dashboard-assets/dashboard/latest.json" --no-sign-request=false

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler pages deploy dashboard/dist --project-name=cogitator-app --commit-dirty=true

      - name: Notify orchestrator
        if: success()
        env:
          ORCHESTRATOR_URL: ${{ secrets.ORCHESTRATOR_URL }}
          INTERNAL_SECRET: ${{ secrets.INTERNAL_SECRET }}
        run: |
          SHA=$(cat sha256.txt)
          VERSION="${{ steps.version.outputs.version }}"
          curl -sf -X POST "$ORCHESTRATOR_URL/api/internal/releases" \
            -H "X-Internal-Secret: $INTERNAL_SECRET" \
            -H "Content-Type: application/json" \
            -d "{
              \"version\": \"$VERSION\",
              \"frontend_version\": \"$VERSION\",
              \"severity\": \"minor\",
              \"components\": \"frontend_only\",
              \"changelog\": \"Dashboard update $VERSION\"
            }"
