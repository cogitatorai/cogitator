services:
  cogitator:
    image: cogitator
    build: .
    ports:
      - "${COGITATOR_SERVER_PORT:-8484}:${COGITATOR_SERVER_PORT:-8484}"
    volumes:
      # The container runs as uid/gid 1000 (non-root). The host directory mounted
      # here must be writable by uid 1000. If you upgraded from an older image that
      # ran as root, fix ownership once with: sudo chown -R 1000:1000 <host dir>
      - ${COGITATOR_WORKSPACE_PATH:-${HOME}/.cogitator}:/data
    env_file:
      - .env
    environment:
      - COGITATOR_WORKSPACE_PATH=/data
    restart: unless-stopped
    healthcheck:
      # $$ defers expansion to the container shell so the env_file port override applies
      test: ["CMD-SHELL", "wget -q -O /dev/null \"http://localhost:$${COGITATOR_SERVER_PORT:-8484}/api/health\" || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
